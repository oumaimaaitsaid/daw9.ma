# ========================================
# Daw9.ma - Configuration
# ========================================

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/daw9_db?characterEncoding=UTF-8}
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=change-me-in-production
jwt.expiration=86400000

# OpenAI API
openai.api.key=your-key-here
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o

# Stripe (paiement)
stripe.api.key=sk_test_YOUR_STRIPE_KEY_HERE
stripe.webhook.secret=whsec_YOUR_WEBHOOK_SECRET_HERE

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# CORS
cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.daw9=DEBUG
logging.level.org.springframework.security=DEBUG

spring.jpa.defer-datasource-initialization=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
